openapi: 3.0.3
info:
  title: NextGen WOM User Password Reset API
  version: 1.0.0
paths:
  /api/users/{userId}/reset-password:
    post:
      summary: Reset a managed user's password
      description: >-
        Allows admin or client_admin users to reset another active user's password.
        Generates temporary credentials and sends notification email.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  userId:
                    type: integer
                  emailSent:
                    type: boolean
        '400':
          description: Invalid reset request (e.g., self-reset)
        '403':
          description: Forbidden (insufficient role or cross-tenant attempt)
        '404':
          description: User not found
        '500':
          description: Server error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
